<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telco Spec Assistant</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6978;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --warn: #9f1239;
      --ok: #166534;
      --code: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 1px;
      min-height: 100vh;
      background: var(--line);
    }

    .query-pane,
    .answer-pane {
      background: var(--panel);
      min-width: 0;
    }

    .query-pane {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .answer-pane {
      padding: 28px 32px;
      overflow: auto;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 700;
    }

    .scope {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: var(--text);
      font: inherit;
      line-height: 1.45;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
    }

    .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example-button,
    .submit-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      text-align: left;
    }

    .example-button {
      min-height: 42px;
      padding: 10px 12px;
      line-height: 1.3;
    }

    .example-button:hover {
      border-color: var(--accent);
    }

    .submit-button {
      min-height: 44px;
      padding: 10px 16px;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      text-align: center;
      font-weight: 700;
    }

    .submit-button:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .submit-button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .answer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .status {
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--code);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status.supported {
      color: var(--ok);
      background: #dcfce7;
    }

    .status.unsupported {
      color: var(--warn);
      background: #ffe4e6;
    }

    .answer-text {
      max-width: 880px;
      min-height: 140px;
      margin: 0;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.65;
    }

    .empty {
      color: var(--muted);
    }

    .meta {
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .citations {
      margin-top: 28px;
      max-width: 980px;
    }

    .citations h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .citation-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .citation {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfe;
    }

    .citation-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    .citation-title span {
      color: var(--muted);
      font-weight: 500;
    }

    .snippet {
      margin: 0;
      color: #344054;
      font-size: 14px;
      line-height: 1.5;
    }

    .error {
      color: var(--warn);
    }

    @media (max-width: 840px) {
      main {
        display: block;
      }

      .query-pane,
      .answer-pane {
        padding: 22px;
      }

      .query-pane {
        border-bottom: 1px solid var(--line);
      }

      .answer-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="query-pane" aria-labelledby="app-title">
      <header>
        <h1 id="app-title">Telco Spec Assistant</h1>
        <p class="scope">MAC, RLC, and RRC Rel-19 v19.2.0</p>
      </header>

      <form id="ask-form">
        <label for="question">Question</label>
        <textarea id="question" name="question" spellcheck="false">What are the three RLC modes?</textarea>
        <button class="submit-button" type="submit">Ask</button>
      </form>

      <div class="examples" aria-label="Sample questions">
        <button class="example-button" type="button">How does AM RLC do error recovery by retransmission after reception failure?</button>
        <button class="example-button" type="button">Which MAC procedure tells the serving gNB how much uplink data is waiting in the UE?</button>
        <button class="example-button" type="button">Which RRC clause covers detection of physical layer problems in RRC_CONNECTED?</button>
      </div>
    </section>

    <section class="answer-pane" aria-live="polite">
      <div class="answer-header">
        <h2>Answer</h2>
        <div id="status" class="status">Ready</div>
      </div>
      <p id="answer" class="answer-text empty">No answer yet.</p>
      <div id="meta" class="meta"></div>
      <section class="citations" aria-labelledby="citations-title">
        <h3 id="citations-title">Citations</h3>
        <ul id="citations" class="citation-list"></ul>
      </section>
    </section>
  </main>

  <script>
    const form = document.querySelector("#ask-form");
    const question = document.querySelector("#question");
    const answer = document.querySelector("#answer");
    const citations = document.querySelector("#citations");
    const status = document.querySelector("#status");
    const meta = document.querySelector("#meta");
    const submit = document.querySelector(".submit-button");

    document.querySelectorAll(".example-button").forEach((button) => {
      button.addEventListener("click", () => {
        question.value = button.textContent.trim();
        question.focus();
      });
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = question.value.trim();
      if (!text) {
        setError("Question is empty.");
        return;
      }

      setLoading();
      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: JSON.stringify({question: text})
        });
        const payload = await response.json();
        if (!response.ok) {
          setError(payload.error || "Request failed.");
          return;
        }
        renderAnswer(payload);
      } catch (error) {
        setError("The request could not be completed.");
      }
    });

    function setLoading() {
      submit.disabled = true;
      status.className = "status";
      status.textContent = "Searching";
      answer.className = "answer-text empty";
      answer.textContent = "Retrieving cited evidence...";
      meta.textContent = "";
      citations.replaceChildren();
    }

    function setError(message) {
      submit.disabled = false;
      status.className = "status unsupported";
      status.textContent = "Error";
      answer.className = "answer-text error";
      answer.textContent = message;
      meta.textContent = "";
      citations.replaceChildren();
    }

    function renderAnswer(payload) {
      submit.disabled = false;
      const supported = Boolean(payload.supported);
      status.className = supported ? "status supported" : "status unsupported";
      status.textContent = supported ? "Supported" : "Insufficient evidence";
      answer.className = "answer-text";
      answer.textContent = payload.answer || "No answer returned.";
      meta.textContent = payload.generator ? `Generator: ${payload.generator}` : "";
      citations.replaceChildren();

      const citationItems = Array.isArray(payload.citations) ? payload.citations : [];
      citationItems.forEach((citation) => {
        const item = document.createElement("li");
        item.className = "citation";

        const title = document.createElement("div");
        title.className = "citation-title";
        title.textContent = `${citation.spec_id || "Spec"} ${citation.section || ""}`.trim();

        const version = document.createElement("span");
        version.textContent = [citation.release, citation.version].filter(Boolean).join(" / ");
        title.appendChild(version);

        const snippet = document.createElement("p");
        snippet.className = "snippet";
        snippet.textContent = citation.snippet || citation.section_title || "";

        item.appendChild(title);
        item.appendChild(snippet);
        citations.appendChild(item);
      });
    }
  </script>
</body>
</html>
